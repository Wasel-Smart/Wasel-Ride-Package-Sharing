<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Wasel premium circular mark</title>
  <desc id="desc">A refined circular mobility logo with a ring road, river junction, skyline, and green urban core.</desc>
  <defs>
