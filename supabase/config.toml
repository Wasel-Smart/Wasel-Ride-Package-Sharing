# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "zexlxabdcsjefptmjhuq"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seeds/*.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://localhost:5173/app/auth/callback",
  "http://127.0.0.1:5173/app/auth/callback",
  "http://localhost:4173",
  "http://127.0.0.1:4173",
  "http://localhost:4173/app/auth/callback",
  "http://127.0.0.1:4173/app/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# OAuth Providers - Google
# Client ID: https://supabase.com/dashboard/project/zexlxabdcsjefptmjhuq/auth/oauth-apps
# Google Cloud Console: https://console.cloud.google.com/auth/overview?project=wasel14
[auth.external.google]
enabled = true
client_id = "235290462223-ooc9cnn6r80ruk475p88286hiepqu8b5.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = false

# Allowed alternate OAuth client (web app)
# client_id_alt = "235290462223-slmuhn0n9nvmalq3tfdt7cl5de55fcnp.apps.googleusercontent.com"

[auth.external.facebook]
enabled = true
client_id = "env(SUPABASE_AUTH_FACEBOOK_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_FACEBOOK_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[functions.make-server-0b1f4071]
verify_jwt = false
