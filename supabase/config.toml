# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "wasel"

[api]
enabled = true
port = 54321
schemas = ["api", "graphql_public", "stripe", "pgmq_public", "public"]
extra_search_path = ["extensions", "realtime", "supabase_migrations", "stripe", "vault", "auth", "storage", "api"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seeds/*.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[auth]
enabled = true
site_url = "https://wasel14.online"
additional_redirect_urls = [
  "https://wasel14.online",
  "https://www.wasel14.online",
  "https://wasel14.online/app/auth/callback",
  "https://www.wasel14.online/app/auth/callback",
  "https://wasel-ride-package-sharing-ten.vercel.app",
  "https://wasel-ride-package-sharing-ten.vercel.app/app/auth/callback",
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://localhost:5173/app/auth/callback",
  "http://127.0.0.1:5173/app/auth/callback",
  "http://localhost:4173",
  "http://127.0.0.1:4173",
  "http://localhost:4173/app/auth/callback",
  "http://127.0.0.1:4173/app/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = true
enable_signup = true
enable_anonymous_sign_ins = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = true

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.test_otp]
962792084333 = "123456"

[auth.sms.twilio]
enabled = false
account_sid = "env(SUPABASE_AUTH_SMS_TWILIO_ACCOUNT_SID)"
message_service_sid = "env(SUPABASE_AUTH_SMS_TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

# OAuth Providers - Google and Facebook
[auth.external.google]
enabled = true
client_id = "235290462223-ooc9cnn6r80ruk475p88286hiepqu8b5.apps.googleusercontent.com"
secret = "hash:1b4f86adb9b0e691ecc27e66d6e09ca8020c1a7316e49d1577f148d49e073757"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = true
email_optional = true

[auth.external.facebook]
enabled = true
client_id = "939540775374132"
secret = "hash:b60e9f8acdd2a2149b4580f70b8760a1802266cbd521368559ed89396a26ba70"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
email_optional = true

[auth.web3.solana]
enabled = true

[auth.web3.ethereum]
enabled = true

[functions.make-server-0b1f4071]
verify_jwt = true

[functions.provider-webhooks]
verify_jwt = false

[functions.webhook]
verify_jwt = false
