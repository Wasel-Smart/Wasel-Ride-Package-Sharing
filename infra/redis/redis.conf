# Redis Production Configuration for Wasel Event Streaming
bind 0.0.0.0
port 6379
tcp-keepalive 300

# AOF Persistence
appendonly yes
appendfilename "wasel-events.aof"
appendfsync everysec

# RDB Snapshots
save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename wasel-dump.rdb

# Memory
maxmemory 2gb
maxmemory-policy noeviction

# Security
requirepass WASEL_REDIS_PASSWORD_REPLACE_IN_PROD

# Stream tuning
stream-node-max-bytes 4096
stream-node-max-entries 100
