global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'wasel-services'
    static_configs:
      - targets:
          - ride-matching-service:8080
          - payment-reconciliation-service:8080
          - ops-analytics-service:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9090
    metrics_path: /metrics

  - job_name: 'redis-alerts'
    static_configs:
      - targets:
          - redis:9121
  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
          - postgres:9187

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093