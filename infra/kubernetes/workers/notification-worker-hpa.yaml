apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wasel-notification-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wasel-notification-worker
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 200
          periodSeconds: 20
