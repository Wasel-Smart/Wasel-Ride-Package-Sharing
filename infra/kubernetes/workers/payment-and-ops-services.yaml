apiVersion: v1
kind: Service
metadata:
  name: payment-reconciliation-service
  namespace: wasel-production
  labels:
    app: payment-reconciliation-service
spec:
  selector:
    app: payment-reconciliation-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-reconciliation-service
  namespace: wasel-production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: payment-reconciliation-service
  template:
    metadata:
      labels:
        app: payment-reconciliation-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: payment-reconciliation
          image: wasel.azurecr.io/payment-reconciliation-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: wasel-config
                  key: redis.host
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: database.url
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: stripe.secret.key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-reconciliation-hpa
  namespace: wasel-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-reconciliation-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: v1
kind: Service
metadata:
  name: ops-analytics-service
  namespace: wasel-production
  labels:
    app: ops-analytics-service
spec:
  selector:
    app: ops-analytics-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-analytics-service
  namespace: wasel-production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ops-analytics-service
  template:
    metadata:
      labels:
        app: ops-analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: ops-analytics
          image: wasel.azurecr.io/ops-analytics-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: wasel-config
                  key: redis.host
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: database.url
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ops-analytics-hpa
  namespace: wasel-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ops-analytics-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
