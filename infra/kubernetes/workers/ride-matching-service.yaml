apiVersion: v1
kind: Service
metadata:
  name: ride-matching-service
  namespace: wasel-production
  labels:
    app: ride-matching-service
    tier: backend
    component: worker
spec:
  selector:
    app: ride-matching-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-matching-service
  namespace: wasel-production
  labels:
    app: ride-matching-service
    tier: backend
    component: worker
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ride-matching-service
  template:
    metadata:
      labels:
        app: ride-matching-service
        tier: backend
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wasel-worker
      containers:
        - name: ride-matching-service
          image: wasel.azurecr.io/ride-matching-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: wasel-config
                  key: redis.host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: wasel-config
                  key: redis.port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: redis.password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: database.url
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: wasel-secrets
                  key: sentry.dsn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ride-matching-service-hpa
  namespace: wasel-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ride-matching-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ride-matching-service-pdb
  namespace: wasel-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ride-matching-service
