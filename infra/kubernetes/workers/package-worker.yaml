apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasel-package-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wasel-package-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wasel-package-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/wasel-smart/wasel-worker:latest
          args: ["package-worker"]
          envFrom:
            - configMapRef:
                name: wasel-worker-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
