apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasel-web
spec:
  tls:
    - hosts:
        - dev.wasel.local
      secretName: wasel-web-dev-tls
  rules:
    - host: dev.wasel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasel-web
                port:
                  name: http
