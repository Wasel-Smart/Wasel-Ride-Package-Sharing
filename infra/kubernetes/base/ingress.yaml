apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasel-web
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - wasel.example.com
      secretName: wasel-web-tls
  rules:
    - host: wasel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasel-web
                port:
                  name: http
