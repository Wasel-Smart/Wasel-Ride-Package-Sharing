apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: wasel
data:
  redis.conf: |
    # Persistence
    appendonly yes
    appendfsync everysec
    
    # Memory management
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    
    # Replication
    min-replicas-to-write 1
    min-replicas-max-lag 10
    
    # Streams retention
    stream-node-max-bytes 4096
    stream-node-max-entries 100
    
    # Logging
    loglevel notice
    
    # Performance
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-streams
  namespace: wasel
spec:
  serviceName: redis-streams
  replicas: 3
  selector:
    matchLabels:
      app: redis-streams
  template:
    metadata:
      labels:
        app: redis-streams
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-streams
  namespace: wasel
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis-streams
---
apiVersion: v1
kind: Service
metadata:
  name: redis-streams-headless
  namespace: wasel
spec:
  type: LoadBalancer
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis-streams
