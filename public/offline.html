<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111B" />
    <title>Offline | Wasel</title>
    <style>
      :root {
        --bg: #07111b;
        --panel: rgba(10, 18, 28, 0.94);
        --panel-border: rgba(244, 198, 81, 0.18);
        --text: #f8efd6;
        --muted: rgba(248, 239, 214, 0.72);
        --soft: rgba(248, 239, 214, 0.52);
        --gold: #f4c651;
        --bronze: #c5831f;
        --cream: #fff0c1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 232, 160, 0.16), transparent 24%),
          radial-gradient(circle at 78% 14%, rgba(244, 198, 81, 0.16), transparent 22%),
          radial-gradient(circle at 82% 70%, rgba(197, 131, 31, 0.12), transparent 20%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)), var(--bg);
      }

      .shell {
        position: relative;
        width: min(100%, 720px);
        border-radius: 32px;
        padding: 32px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
          var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .shell::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 60% 30%, rgba(255, 240, 193, 0.08), transparent 24%),
          radial-gradient(circle at 74% 16%, rgba(244, 198, 81, 0.1), transparent 18%),
          radial-gradient(circle at 82% 54%, rgba(197, 131, 31, 0.08), transparent 18%);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .brand img {
        width: 72px;
        height: 72px;
        object-fit: cover;
        display: block;
        filter: drop-shadow(0 0 18px rgba(244, 198, 81, 0.18));
      }

      .eyebrow {
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold);
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2.1rem, 6vw, 3.4rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
        position: relative;
        z-index: 1;
      }

      .lead {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 1rem;
        position: relative;
        z-index: 1;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
        position: relative;
        z-index: 1;
      }

      .button,
      .button-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 20px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 800;
        font-size: 0.95rem;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .button {
        background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 52%, var(--bronze) 100%);
        color: #120d04;
        box-shadow: 0 18px 36px rgba(197, 131, 31, 0.24);
      }

      .button-secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(244, 198, 81, 0.18);
      }

      .button:hover,
      .button-secondary:hover {
        transform: translateY(-1px);
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 28px;
        position: relative;
        z-index: 1;
      }

      .meta-card {
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .meta-title {
        color: var(--soft);
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .meta-copy {
        color: var(--text);
        font-size: 0.92rem;
        font-weight: 700;
        line-height: 1.5;
      }

      .status {
        margin-top: 18px;
        color: var(--soft);
        font-size: 0.86rem;
        position: relative;
        z-index: 1;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 24px;
          border-radius: 24px;
        }

        .meta {
          grid-template-columns: 1fr;
        }

        .brand img {
          width: 60px;
          height: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="brand">
        <img src="/brand/wasellogo-160.png?v=20260422-premium" alt="Wasel logo" />
        <div>
          <div class="eyebrow">Wasel offline</div>
          <div style="font-size: 1.5rem; font-weight: 900">Wasel</div>
        </div>
      </div>

      <h1>You are offline.</h1>
      <p class="lead">
        Cached Wasel screens are still available. Reconnect to resume live rides, packages, and
        bookings.
      </p>

      <div class="actions">
        <a
          href="/"
          class="button"
          onclick="
            window.location.reload();
            return false;
          "
          >Reload Wasel</a
        >
        <a href="/app/find-ride" class="button-secondary">Open cached app</a>
      </div>

      <div class="meta">
        <div class="meta-card">
          <div class="meta-title">Status</div>
          <div class="meta-copy">Cached mode active</div>
        </div>
        <div class="meta-card">
          <div class="meta-title">Available</div>
          <div class="meta-copy">Saved screens and assets</div>
        </div>
        <div class="meta-card">
          <div class="meta-title">Next step</div>
          <div class="meta-copy">Reconnect for live updates</div>
        </div>
      </div>

      <div class="status" id="status">Waiting for network to return.</div>
    </div>

    <script>
      const status = document.getElementById('status');

      function updateStatus() {
        if (!status) return;
        status.textContent = navigator.onLine
          ? 'Connection restored. Reloading Wasel...'
          : 'Waiting for network to return.';
      }

      window.addEventListener('online', () => {
        updateStatus();
        window.location.reload();
      });

      window.addEventListener('offline', updateStatus);
      updateStatus();
    </script>
  </body>
</html>
