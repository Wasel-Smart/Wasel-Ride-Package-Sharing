        <circle r="20.5" fill="#13171D" />
        <circle r="12.5" fill="url(#nodeCoreWarm)" />
        <circle cx="-5" cy="-5.5" r="3.9" fill="#FFF7EC" opacity="0.72" />
        <circle r="25.5" stroke="rgba(255,255,255,0.34)" stroke-width="1.5" />
      </g>

