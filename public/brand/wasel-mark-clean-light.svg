<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 464 360"
  fill="none"
  role="img"
  aria-labelledby="title desc"
  preserveAspectRatio="xMidYMid meet"
>
  <title id="title">Wasel routed W logo</title>
  <desc id="desc">A transparent Wasel W mark combining travel lanes, a route line, and a location pin.</desc>
  <defs>
    <linearGradient id="wasel-left-lane" x1="110" y1="92" x2="206" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F7DE7" />
      <stop offset="0.52" stop-color="#3D8BE8" />
      <stop offset="1" stop-color="#52C5F0" />
    </linearGradient>
    <linearGradient id="wasel-center-lane" x1="182" y1="312" x2="270" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D2C91" />
      <stop offset="0.42" stop-color="#2C6FCA" />
      <stop offset="1" stop-color="#51D2F1" />
    </linearGradient>
    <linearGradient id="wasel-green-lane" x1="246" y1="88" x2="340" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7F01D" />
      <stop offset="0.5" stop-color="#6CD532" />
      <stop offset="1" stop-color="#1A8C41" />
    </linearGradient>
    <linearGradient id="wasel-right-lane" x1="330" y1="312" x2="414" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3E93EF" />
      <stop offset="0.42" stop-color="#39C7E6" />
      <stop offset="1" stop-color="#F0FF2B" />
    </linearGradient>
    <linearGradient id="wasel-route-fill" x1="176" y1="322" x2="432" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98" />
      <stop offset="1" stop-color="#E5FF7A" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="wasel-route-glow" x1="184" y1="336" x2="422" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#59D8F2" stop-opacity="0.72" />
      <stop offset="1" stop-color="#F0FF6C" stop-opacity="0.72" />
    </linearGradient>
    <linearGradient id="wasel-pin-fill" x1="250" y1="130" x2="298" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D5FF38" />
      <stop offset="1" stop-color="#4DCB39" />
    </linearGradient>
    <linearGradient id="wasel-overlap-shadow" x1="212" y1="160" x2="310" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09122D" stop-opacity="0.02" />
      <stop offset="0.5" stop-color="#0A1640" stop-opacity="0.38" />
      <stop offset="1" stop-color="#031128" stop-opacity="0.1" />
    </linearGradient>
    <clipPath id="wasel-overlap-clip">
      <path d="M178 306L258 100L338 306H178Z" />
    </clipPath>
    <filter id="wasel-soft-shadow" x="-24" y="-24" width="512" height="408" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#041018" flood-opacity="0.18" />
    </filter>
  </defs>

  <g filter="url(#wasel-soft-shadow)">
    <path d="M112 104L182 308" stroke="url(#wasel-left-lane)" stroke-width="66" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M182 308L258 102" stroke="url(#wasel-center-lane)" stroke-width="66" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M258 102L336 308" stroke="url(#wasel-green-lane)" stroke-width="66" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M336 308L410 104" stroke="url(#wasel-right-lane)" stroke-width="66" stroke-linecap="round" stroke-linejoin="round" />
    <g clip-path="url(#wasel-overlap-clip)">
      <path d="M178 306L258 102L338 306L300 306L256 174L218 306Z" fill="url(#wasel-overlap-shadow)" />
    </g>
    <path d="M178 308C166 324 168 342 187 347C216 354 252 334 280 312C303 294 319 279 346 261C373 243 400 223 420 198" stroke="url(#wasel-route-glow)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.28" />
    <path d="M178 308C166 324 168 342 187 347C216 354 252 334 280 312C303 294 319 279 346 261C373 243 400 223 420 198" stroke="url(#wasel-route-fill)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M272 138C248 138 228 157 228 181C228 214 264 240 272 257C280 240 316 214 316 181C316 157 296 138 272 138Z" fill="url(#wasel-pin-fill)" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round" />
    <circle cx="272" cy="181" r="13" fill="#FFFFFF" />
  </g>
</svg>
