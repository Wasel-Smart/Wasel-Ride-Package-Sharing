<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
  viewBox="0 0 512 512"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Wasel logo on dark background</title>
  <desc id="desc">The Wasel arrow logo on a deep navy card for dark surfaces.</desc>
  <defs>
    <linearGradient id="darkBg" x1="24" y1="18" x2="486" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#091A33" />
      <stop offset="1" stop-color="#0C2141" />
    </linearGradient>
    <radialGradient id="darkBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(184 232) rotate(90) scale(144 168)">
      <stop offset="0" stop-color="#46B7E5" stop-opacity="0.22" />
      <stop offset="1" stop-color="#46B7E5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="darkGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(334 242) rotate(90) scale(132 154)">
      <stop offset="0" stop-color="#9BCB14" stop-opacity="0.2" />
      <stop offset="1" stop-color="#9BCB14" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="88" fill="url(#darkBg)" />
  <rect x="20.5" y="20.5" width="471" height="471" rx="87.5" stroke="#173355" />
  <ellipse cx="192" cy="236" rx="162" ry="138" fill="url(#darkBlue)" />
  <ellipse cx="334" cy="242" rx="142" ry="130" fill="url(#darkGreen)" />
  <image href="/brand/wasel-mark-clean.svg" x="42" y="72" width="428" height="340" />
</svg>
