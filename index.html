    <!-- ── STRUCTURED DATA: FAQPage ──────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Wasel work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Drivers post their intercity route, departure time, and available seats. Riders search for a matching route and book a seat. You split the travel cost — everyone saves up to 35% compared to solo travel."
          }
        },
        {
          "@type": "Question",
          "name": "Which cities does Wasel serve in Jordan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wasel operates across all major Jordanian cities including Amman, Aqaba, Irbid, Zarqa, Petra, Jerash, Madaba, and Salt, with more routes being added based on demand."
          }
        },
        {
          "@type": "Question",
          "name": "Is Wasel safe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All drivers are identity-verified with their Jordanian National ID before they can offer a route. Trips are tracked in real time, riders can share live location with trusted contacts, and our two-way community rating system ensures accountability."
          }
        },
        {
          "@type": "Question",
          "name": "What is Raje3?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Raje3 (رجع — meaning return in Arabic) is Wasel's return-trip feature. When a driver or rider completes a journey, Raje3 instantly matches them with people going back the same way, eliminating empty seats and cutting costs further."
          }
        },
        {
          "@type": "Question",
          "name": "Can I send a package with Wasel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Wasel supports intercity package delivery. Drivers with available space can carry packages alongside passengers, giving senders a faster and more affordable alternative to standard courier services."
          }
        },
        {
          "@type": "Question",
          "name": "كيف يعمل واصل؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "يضع السائقون مسارهم بين المدن ووقت المغادرة والمقاعد المتاحة. يبحث الركاب عن مسار مطابق ويحجزون مقعدًا. تتقاسمون تكلفة الرحلة — الجميع يوفر ما يصل إلى 35٪ مقارنة بالسفر المنفرد."
          }
        }
      ]
    }
    </script>
