    <script>
      (() => {
        const STORAGE_KEY = 'wasel-theme';
        const LEGACY_KEY = 'wasel.settings.display';
        const FALLBACK_THEME = 'light';
        const LIGHT_THEME_COLOR = '#F5EFE6';
        const DARK_THEME_COLOR = '#0B0F14';

        const sanitize = value =>
          value === 'light' || value === 'dark' || value === 'system' ? value : FALLBACK_THEME;

        let preference = FALLBACK_THEME;

        try {
          const stored = window.localStorage.getItem(STORAGE_KEY);
          if (stored) {
            preference = sanitize(stored);
          } else {
            const legacy = window.localStorage.getItem(LEGACY_KEY);
            if (legacy) {
              preference = sanitize(JSON.parse(legacy)?.theme);
            }
          }
        } catch {
          preference = FALLBACK_THEME;
        }

        const resolved =
          preference === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : preference;

        const root = document.documentElement;
        root.classList.toggle('light', resolved === 'light');
        root.classList.toggle('dark', resolved === 'dark');
        root.dataset.theme = resolved;
        root.dataset.themePreference = preference;
        root.dataset.themeReady = 'false';
        root.style.colorScheme = resolved;

        const themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute(
            'content',
            resolved === 'light' ? LIGHT_THEME_COLOR : DARK_THEME_COLOR,
          );
        }
      })();
    </script>

    <!-- ── Optional Google Analytics (set VITE_GA_MEASUREMENT_ID in production) ── -->
    <script>
      (() => {
        const id = '%VITE_GA_MEASUREMENT_ID%';
        if (!id || id.includes('VITE_') || id === 'undefined') return;
        const script = document.createElement('script');
        script.async = true;
        script.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(id)}`;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id, { anonymize_ip: true });
      })();
    </script>
