version: '3.9'

services:
  supabase-db:
    image: supabase/postgres:15.1.0.117
    container_name: wasel-supabase-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}
      POSTGRES_DB: postgres
    ports:
      - '54322:5432'
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-studio:
    image: supabase/studio:20231123-64a766a
    container_name: wasel-supabase-studio
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-meta:8080
    ports:
      - '54323:3000'
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  wasel-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasel-web
    ports:
      - '8080:8080'
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:54321}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_APP_URL=${VITE_APP_URL:-http://localhost:8080}
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  supabase-db-data:
    driver: local
