version: '3.9'

# Development environment with full local Supabase stack
# Use this for local development with isolated backend services

services:
  supabase-db:
    image: supabase/postgres:15.1.0.117
    container_name: wasel-dev-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - '54322:5432'
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wasel-network

  supabase-auth:
    image: supabase/gotrue:v2.99.0
    container_name: wasel-dev-auth
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:54321}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:5173,http://127.0.0.1:5173}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_AUTH:-true}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_FACEBOOK_ENABLED: ${ENABLE_FACEBOOK_AUTH:-true}
      GOTRUE_EXTERNAL_FACEBOOK_CLIENT_ID: ${SUPABASE_AUTH_FACEBOOK_CLIENT_ID}
      GOTRUE_EXTERNAL_FACEBOOK_SECRET: ${SUPABASE_AUTH_FACEBOOK_CLIENT_SECRET}
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wasel-network

  supabase-rest:
    image: postgrest/postgrest:v11.2.0
    container_name: wasel-dev-rest
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wasel-network

  supabase-realtime:
    image: supabase/realtime:v2.25.35
    container_name: wasel-dev-realtime
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}
      DB_NAME: postgres
      DB_SSL: "false"
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wasel-network

  supabase-studio:
    image: supabase/studio:20231123-64a766a
    container_name: wasel-dev-studio
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    ports:
      - '54323:3000'
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wasel-network

  wasel-web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: wasel-web-dev
    ports:
      - '5173:5173'
    environment:
      - VITE_SUPABASE_URL=http://localhost:54321
      - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
      - VITE_APP_URL=http://localhost:5173
      - VITE_ALLOW_DIRECT_SUPABASE_FALLBACK=true
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wasel-network

volumes:
  supabase-db-data:
    driver: local

networks:
  wasel-network:
    driver: bridge
