version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: wasel-dev-redis
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wasel-network

  postgres:
    image: supabase/postgres:15.1.0.117
    container_name: wasel-dev-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wasel-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: wasel-redis-insight
    ports:
      - '8001:8001'
    volumes:
      - redis-insight-data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wasel-network

networks:
  wasel-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  redis-insight-data:
    driver: local
