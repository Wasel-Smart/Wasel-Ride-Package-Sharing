openapi: 3.1.0
info:
  title: Wasel Platform API
  version: 1.0.0
  description: >
    Versioned API contract for ride matching, package delivery, payments,
    and operational health.
servers:
  - url: https://api.wasel.example.com/v1
paths:
  /rides:
    post:
      summary: Create a ride request
      operationId: createRide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRideRequest'
      responses:
        '201':
          description: Ride created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideResponseEnvelope'
  /rides/{rideId}/accept:
    post:
      summary: Accept a matched ride
      operationId: acceptRide
      parameters:
        - $ref: '#/components/parameters/RideId'
      responses:
        '200':
          description: Ride accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideResponseEnvelope'
  /packages:
    post:
      summary: Create a package delivery request
      operationId: createPackage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePackageRequest'
      responses:
        '201':
          description: Package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageResponseEnvelope'
  /packages/{packageId}/location:
    patch:
      summary: Push a throttled location update
      operationId: updatePackageLocation
      parameters:
        - $ref: '#/components/parameters/PackageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdateRequest'
      responses:
        '200':
          description: Location accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageResponseEnvelope'
  /payments/packages/{packageId}/authorize:
    post:
      summary: Authorize a package payment
      operationId: authorizePackagePayment
      parameters:
        - $ref: '#/components/parameters/PackageId'
      responses:
        '200':
          description: Payment authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponseEnvelope'
  /ops/health:
    get:
      summary: Platform health check
      operationId: getHealth
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponseEnvelope'
components:
  parameters:
    RideId:
      name: rideId
      in: path
      required: true
      schema:
        type: string
    PackageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Metadata:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
        version:
          type: string
    ErrorPayload:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true
    EnvelopeBase:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
    Ride:
      type: object
      required: [id, status, lifecycleStatus, origin, destination]
      properties:
        id:
          type: string
        status:
          type: string
        lifecycleStatus:
          type: string
          enum: [requested, matched, accepted, in_progress, completed, cancelled]
        origin:
          type: string
        destination:
          type: string
    Package:
      type: object
      required: [id, status, lifecycleStatus, trackingCode]
      properties:
        id:
          type: string
        status:
          type: string
        lifecycleStatus:
          type: string
          enum: [created, assigned, picked_up, in_transit, delivered, cancelled]
        trackingCode:
          type: string
    Payment:
      type: object
      required: [entityId, amount, status]
      properties:
        entityId:
          type: string
        amount:
          type: number
        status:
          type: string
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
        services:
          type: array
          items:
            type: object
            additionalProperties: true
    CreateRideRequest:
      type: object
      required: [origin, destination, departureAt, seatsRequested]
      properties:
        origin:
          type: string
        destination:
          type: string
        departureAt:
          type: string
          format: date-time
        seatsRequested:
          type: integer
    CreatePackageRequest:
      type: object
      required: [origin, destination, size, value]
      properties:
        origin:
          type: string
        destination:
          type: string
        size:
          type: string
          enum: [small, medium, large]
        value:
          type: number
    LocationUpdateRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
        longitude:
          type: number
    RideResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [success, data]
          properties:
            success:
              type: boolean
              const: true
            data:
              $ref: '#/components/schemas/Ride'
    PackageResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [success, data]
          properties:
            success:
              type: boolean
              const: true
            data:
              $ref: '#/components/schemas/Package'
    PaymentResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [success, data]
          properties:
            success:
              type: boolean
              const: true
            data:
              $ref: '#/components/schemas/Payment'
    HealthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [success, data]
          properties:
            success:
              type: boolean
              const: true
            data:
              $ref: '#/components/schemas/Health'
    ErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [success, error]
          properties:
            success:
              type: boolean
              const: false
            error:
              $ref: '#/components/schemas/ErrorPayload'
