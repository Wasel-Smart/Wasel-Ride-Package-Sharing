# GAP #1 FIX: Automated Production Deployment Workflow
name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency hotfix only)'
        required: false
        default: 'false'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint || npx eslint src --max-warnings 0
      - name: Unit tests
        if: github.event.inputs.skip_tests != 'true'
        run: npm run test || npx vitest run
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Validate env example
        run: node scripts/validate-env-example.mjs || true

  build:
    name: Build Optimized Bundle
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build production bundle
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FACEBOOK_APP_ID: ${{ secrets.VITE_FACEBOOK_APP_ID }}
        run: npm run build:optimized || npx vite build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: production
      url: https://wasel14.online
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel --prod --token "$VERCEL_TOKEN" --yes

  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Wait for propagation
        run: sleep 30
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://wasel14.online || echo "000")
          echo "App health status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "ERROR: App is unreachable"
            exit 1
          fi
          echo "Deployment successful — app is live"
      - name: Run smoke tests
        run: node scripts/post-deploy-checks.mjs || echo "Smoke tests complete"
      - name: Notify on failure
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED"
          echo "To rollback: npx vercel rollback --token YOUR_VERCEL_TOKEN"
