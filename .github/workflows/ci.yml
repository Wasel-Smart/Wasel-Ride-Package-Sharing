name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Verify Supabase migration integrity
        run: npm run verify:supabase-rollout
        continue-on-error: false

      - name: Security headers smoke test
        run: |
          echo "Checking required security headers are configured in vercel.json..."
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
            const headers = (config.headers || []).flatMap(h => h.headers || []).map(h => h.key.toLowerCase());
            const required = ['x-frame-options', 'x-content-type-options', 'strict-transport-security', 'referrer-policy'];
            const missing = required.filter(h => !headers.includes(h));
            if (missing.length > 0) {
              console.error('Missing security headers: ' + missing.join(', '));
              process.exit(1);
            }
            console.log('All required security headers are configured: ' + required.join(', '));
          "

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage
            coverage-summary.json
          if-no-files-found: ignore
