name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_APP_ENV: test
  VITE_APP_URL: http://localhost:3000
  VITE_SUPABASE_URL: https://ci-project.supabase.co
  VITE_SUPABASE_ANON_KEY: ci-anon-key
  VITE_SUPABASE_PUBLISHABLE_KEY: ci-anon-key
  VITE_ENABLE_DEMO_DATA: false
  VITE_ENABLE_SYNTHETIC_TRIPS: false
  VITE_ALLOW_DIRECT_SUPABASE_FALLBACK: false
  VITE_ALLOW_LOCAL_PERSISTENCE_FALLBACK: false

jobs:
  # ── Job 1: Static analysis + unit tests ──────────────────────────────────────
  verify:
    name: Verify (types · lint · format · unit tests · build)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high + critical only)
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run type-check

      - name: Lint (zero warnings)
        run: npm run lint:strict

      - name: Format check (changed source files)
        env:
          DIFF_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          DIFF_HEAD_SHA: ${{ github.sha }}
        run: |
          node - <<'NODE'
            const { execSync } = require('child_process');

            const zeroSha = /^0+$/;
            const head = process.env.DIFF_HEAD_SHA || execSync('git rev-parse HEAD', { encoding: 'utf8' }).trim();
            let base = process.env.DIFF_BASE_SHA?.trim();

            if (!base || zeroSha.test(base)) {
              try {
                base = execSync('git rev-parse HEAD^', { encoding: 'utf8' }).trim();
              } catch {
                base = execSync('git rev-list --max-parents=0 HEAD', { encoding: 'utf8' }).trim().split('\n').pop();
              }
            }

            const diffOutput = execSync(`git diff --name-only ${base} ${head}`, { encoding: 'utf8' });
            const files = diffOutput
              .split('\n')
              .map((file) => file.trim())
              .filter(Boolean)
              .filter((file) => /^src\/.*\.(ts|tsx|css)$/.test(file));

            if (files.length === 0) {
              console.log('No changed source files to format-check.');
              process.exit(0);
            }

            console.log(`Checking Prettier on ${files.length} changed source file(s).`);
            execSync(`npx prettier --check ${files.map((file) => JSON.stringify(file)).join(' ')}`, {
              stdio: 'inherit',
            });
          NODE

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Bundle size gate (600 KB per chunk)
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            function dirSize(dir) {
              return fs.readdirSync(dir, { withFileTypes: true }).reduce((total, entry) => {
                const full = path.join(dir, entry.name);
                return total + (entry.isDirectory() ? dirSize(full) : fs.statSync(full).size);
              }, 0);
            }

            const assetsDir = './dist/assets';
            if (!fs.existsSync(assetsDir)) { console.log('No assets dir — skipping'); process.exit(0); }

            const jsFiles = fs.readdirSync(assetsDir).filter(f => f.endsWith('.js'));
            const large = jsFiles.filter(f => fs.statSync(path.join(assetsDir, f)).size > 600 * 1024);
            if (large.length > 0) {
              large.forEach(f => {
                const kb = (fs.statSync(path.join(assetsDir, f)).size / 1024).toFixed(1);
                console.error('OVER BUDGET:', f, kb + ' KB (limit: 600 KB)');
              });
              process.exit(1);
            }
            console.log('Bundle size OK. Total assets:', (dirSize(assetsDir) / 1024).toFixed(0), 'KB');
          "

      - name: Security headers smoke test
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
            const keys = (config.headers || []).flatMap(h => h.headers || []).map(h => h.key.toLowerCase());
            const required = ['x-frame-options','x-content-type-options','strict-transport-security','referrer-policy','content-security-policy','permissions-policy'];
            const missing = required.filter(h => !keys.includes(h));
            if (missing.length) { console.error('Missing:', missing.join(', ')); process.exit(1); }
            console.log('All security headers present.');
          "

      - name: PWA manifest validation
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
            const required = ['name','short_name','icons','start_url','display','background_color','theme_color'];
            const missing = required.filter(k => !manifest[k]);
            if (missing.length) { console.error('Manifest missing:', missing.join(', ')); process.exit(1); }
            if (!manifest.icons || manifest.icons.length < 2) { console.error('Need at least 2 icons'); process.exit(1); }
            const has512 = manifest.icons.some(i => i.sizes && i.sizes.includes('512'));
            if (!has512) { console.error('Missing 512x512 icon'); process.exit(1); }
            console.log('PWA manifest valid.');
          "

      - name: Verify Supabase migration integrity
        run: npm run verify:supabase-rollout
        continue-on-error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage
            coverage-summary.json
          if-no-files-found: ignore

  # ── Job 2: E2E — core user flows ─────────────────────────────────────────────
  e2e-core:
    name: E2E Core flows (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E — core flows
        run: npx playwright test --project=chromium-desktop
        env:
          PLAYWRIGHT_USE_DEMO_DATA: 'true'
          VITE_ENABLE_DEMO_DATA: 'true'
          VITE_ALLOW_DIRECT_SUPABASE_FALLBACK: 'true'
          VITE_ALLOW_LOCAL_PERSISTENCE_FALLBACK: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-report
          path: playwright-report/
          if-no-files-found: ignore

  # ── Job 3: E2E — accessibility WCAG 2.1 AA ───────────────────────────────────
  e2e-a11y:
    name: E2E Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E — WCAG 2.1 AA accessibility audit
        run: npm run test:e2e:a11y -- --project=chromium-desktop
        env:
          PLAYWRIGHT_USE_DEMO_DATA: 'true'
          VITE_ENABLE_DEMO_DATA: 'true'
          VITE_ALLOW_DIRECT_SUPABASE_FALLBACK: 'true'
          VITE_ALLOW_LOCAL_PERSISTENCE_FALLBACK: 'true'

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          if-no-files-found: ignore

  # ── Job 4: E2E — RTL / Arabic layout ─────────────────────────────────────────
  e2e-rtl:
    name: E2E RTL Arabic layout
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E — RTL Arabic
        run: npm run test:e2e:rtl -- --project=rtl-arabic-mobile
        env:
          PLAYWRIGHT_USE_DEMO_DATA: 'true'
          VITE_ENABLE_DEMO_DATA: 'true'
          VITE_ALLOW_DIRECT_SUPABASE_FALLBACK: 'true'
          VITE_ALLOW_LOCAL_PERSISTENCE_FALLBACK: 'true'

  # ── Job 5: Lighthouse performance budget (main branch only) ──────────────────
  lighthouse:
    name: Lighthouse CI (performance budget)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run test:lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
