name: Communications Processor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process-communications:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process queued communication deliveries
        env:
          SUPABASE_MAKE_SERVER_URL: ${{ secrets.SUPABASE_MAKE_SERVER_URL }}
          COMMUNICATION_WORKER_SECRET: ${{ secrets.COMMUNICATION_WORKER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_MAKE_SERVER_URL:-}" ]; then
            echo "SUPABASE_MAKE_SERVER_URL secret is required"
            exit 1
          fi
          if [ -z "${COMMUNICATION_WORKER_SECRET:-}" ]; then
            echo "COMMUNICATION_WORKER_SECRET secret is required"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "content-type: application/json" \
            --header "x-communication-worker-secret: ${COMMUNICATION_WORKER_SECRET}" \
            --data '{"limit":50}' \
            "${SUPABASE_MAKE_SERVER_URL%/}/communications/process"
