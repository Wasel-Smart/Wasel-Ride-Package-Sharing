name: Production Deployment

on:
  push:
    branches: [main, production]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  REGISTRY: wasel.azurecr.io

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run type-check
      
      - name: Lint
        run: npm run lint
      
      - name: Unit tests
        run: npm run test:unit
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  load-tests:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Run smoke tests
        run: |
          chmod +x scripts/run-load-tests.sh
          ./scripts/run-load-tests.sh smoke https://wasel.jo
      
      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: test-results/load/

  build-mobile-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci
      
      - name: Bundle JavaScript
        run: |
          cd mobile
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      
      - name: Build APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Build AAB
        run: |
          cd mobile/android
          ./gradlew bundleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab

  build-mobile-ios:
    name: Build iOS App
    runs-on: macos-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci
      
      - name: Bundle JavaScript
        run: |
          cd mobile
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
      
      - name: Install CocoaPods
        run: |
          cd mobile/ios
          pod install
      
      - name: Build IPA
        run: |
          cd mobile/ios
          xcodebuild \
            -workspace Wasel.xcworkspace \
            -scheme Wasel \
            -configuration Release \
            -archivePath build/Wasel.xcarchive \
            archive
      
      - name: Export IPA
        run: |
          cd mobile/ios
          xcodebuild \
            -exportArchive \
            -archivePath build/Wasel.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/ios/build/Wasel.ipa

  build-backend-services:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: Build and push ride-matching service
        run: |
          docker build -t ${{ env.REGISTRY }}/ride-matching-service:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/ride-matching-service:latest \
            -f backend/services/ride-matching/Dockerfile .
          docker push ${{ env.REGISTRY }}/ride-matching-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/ride-matching-service:latest
      
      - name: Build and push payment-reconciliation service
        run: |
          docker build -t ${{ env.REGISTRY }}/payment-reconciliation-service:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/payment-reconciliation-service:latest \
            -f backend/services/payment-reconciliation/Dockerfile .
          docker push ${{ env.REGISTRY }}/payment-reconciliation-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/payment-reconciliation-service:latest
      
      - name: Build and push ops-analytics service
        run: |
          docker build -t ${{ env.REGISTRY }}/ops-analytics-service:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/ops-analytics-service:latest \
            -f backend/services/ops-analytics/Dockerfile .
          docker push ${{ env.REGISTRY }}/ops-analytics-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/ops-analytics-service:latest

  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [load-tests, build-backend-services]
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group wasel-production \
            --name wasel-cluster
      
      - name: Deploy to Kubernetes
        run: |
          chmod +x scripts/deploy-kubernetes.sh
          ./scripts/deploy-kubernetes.sh
        env:
          WASEL_CLUSTER_NAME: wasel-cluster
          WASEL_NAMESPACE: wasel-production
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          REDIS_HOST: redis-cluster
          REDIS_PORT: "6379"
      
      - name: Verify deployment
        run: |
          kubectl get all -n wasel-production
          kubectl get hpa -n wasel-production

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-kubernetes, build-mobile-android, build-mobile-ios]
    if: always()
    steps:
      - name: Deployment notification
        run: |
          echo "🎉 Deployment complete!"
          echo "Status: ${{ job.status }}"
