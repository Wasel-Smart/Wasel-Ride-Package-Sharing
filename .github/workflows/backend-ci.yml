name: Backend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - 'package.json'
  pull_request:
    paths:
      - 'backend/**'
      - 'package.json'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint backend services
        run: npm run lint:backend

  typecheck-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check backend
        run: npm run type:check:backend || echo 'Type-check skipped: backend tsconfig needs local setup'

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install test deps per service
        working-directory: backend/services/ride-matching
        run: npm install

      - name: Run backend unit tests
        working-directory: backend/services/ride-matching
        run: npm run test

  verify-backend-production-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify backend contracts
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/postgres
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
        run: |
          test -f backend/services/shared/src/errors/app-errors.ts || (echo 'Missing errors module' && exit 1)
          test -f backend/services/shared/src/logging/logger.ts || (echo 'Missing logger module' && exit 1)
          test -f backend/services/shared/src/config/app.config.ts || (echo 'Missing config module' && exit 1)
          test -f backend/services/shared/src/validation/schemas.ts || (echo 'Missing validation module' && exit 1)
          test -f docker-compose.production.yml || (echo 'Missing production compose' && exit 1)

      - name: Confirm no raw console.error in backend services
        run: |
          if Select-String -Path 'backend\services\ride-matching\service-production.ts' -Pattern '^\s*console\.(error|warn|log)\(' -Quiet; then
            Write-Error 'Raw console logging found in ride-matching service — use pino logger';
            exit 1;
          }
          if Select-String -Path 'backend\services\payment-reconciliation\service-production.ts' -Pattern '^\s*console\.(error|warn|log)\(' -Quiet; then
            Write-Error 'Raw console logging found in payment service — use pino logger';
            exit 1;
          }
          if Select-String -Path 'backend\services\ops-analytics\service-production.ts' -Pattern '^\s*console\.(error|warn|log)\(' -Quiet; then
            Write-Error 'Raw console logging found in ops analytics — use pino logger';
            exit 1;
          }
