# GAP #9 FIX: Branch Protection Enforcement via CI
name: Branch Protection Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gates:
    name: Quality Gates (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: ESLint (zero warnings)
        run: npm run lint || npx eslint src --max-warnings 0

      - name: Unit tests (must pass)
        run: npm run test || npx vitest run

      - name: No hardcoded secrets in source
        run: |
          if grep -rn "sk_live_\|AKIA[0-9A-Z]\{16\}" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "ERROR: Hardcoded production secrets detected"
            exit 1
          fi
          echo "✅ Secret check passed"

      - name: Env example stays in sync
        run: node scripts/validate-env-example.mjs || true

  bundle-size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build and analyse bundle
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key_for_build_check
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder_publishable_key_for_build_check
        run: |
          npm run build:optimized 2>/dev/null || npx vite build
          if [ -d "dist" ]; then
            echo "=== Bundle sizes ==="
            find dist -name "*.js" -exec du -sh {} \; | sort -h
            LARGEST_KB=$(find dist -name "*.js" -exec du -k {} \; | sort -rn | head -1 | awk '{print $1}')
            echo "Largest JS chunk: ${LARGEST_KB}KB"
            if [ "${LARGEST_KB:-0}" -gt 500 ]; then
              echo "⚠️ WARNING: Chunk >500KB — consider code splitting"
            else
              echo "✅ Bundle size within limits"
            fi
          fi
