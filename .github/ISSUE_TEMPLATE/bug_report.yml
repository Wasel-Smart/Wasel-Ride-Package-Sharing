name: Bug report
description: Report a reproducible defect in the Wasel web application or platform workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS, and deployed environment.
      placeholder: Chrome 135 on Android 14, production
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste relevant console errors, screenshots, or test output.
