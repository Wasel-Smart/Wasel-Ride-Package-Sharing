version: '3.8'

services:
  # Redis Streams Event Broker
  redis:
    image: redis:7-alpine
    container_name: wasel-redis
    ports:
      - "6379:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL + PostGIS
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: wasel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wasel
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: wasel_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Ride Matching Service
  ride-matching-service:
    build:
      context: .
      dockerfile: backend/services/ride-matching/Dockerfile.production
    container_name: wasel-ride-matching
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: WASEL_REDIS_PASSWORD_REPLACE_IN_PROD
      DATABASE_URL: postgresql://wasel:wasel_dev_password@postgres:5432/wasel
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Payment Reconciliation Service
  payment-reconciliation-service:
    build:
      context: .
      dockerfile: backend/services/payment-reconciliation/Dockerfile.production
    container_name: wasel-payment-reconciliation
    ports:
      - "8082:8080"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: WASEL_REDIS_PASSWORD_REPLACE_IN_PROD
      DATABASE_URL: postgresql://wasel:wasel_dev_password@postgres:5432/wasel
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.3'
          memory: 512M

  # Ops Analytics Worker
  ops-analytics-worker:
    build:
      context: .
      dockerfile: backend/services/ops-analytics/Dockerfile.production
    container_name: wasel-ops-analytics
    ports:
      - "8083:8080"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: WASEL_REDIS_PASSWORD_REPLACE_IN_PROD
      DATABASE_URL: postgresql://wasel:wasel_dev_password@postgres:5432/wasel
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: wasel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: wasel-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: wasel_admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - ./infra/observability/grafana-dashboard-wasel-overview.json:/etc/grafana/provisioning/dashboards/wasel.json
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: wasel-network
